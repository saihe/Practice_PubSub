# ローカル PC で `docker compose up` するだけでフロント/バックが起動する。
#   - backend : Spring Boot (H2 インメモリ)  http://localhost:8080
#   - frontend: Next.js                       http://localhost:3000
# ブラウザは http://localhost:3000 を開く。

services:
  backend:
    build:
      context: ./backend
    container_name: pubsub-backend
    ports:
      - "8080:8080"
    # フロント(ホストの :3000)からの CORS を許可。
    # (env 名は Spring の relaxed binding に合わせてアンダースコア表記)
    environment:
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      # 例外による「異常終了」を観測したくない場合は 0 に。
      # APP_TASK_EXCEPTION_PROBABILITY: "0.10"

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* はビルド時にバンドルへ埋め込まれる。
        # ブラウザはホスト側で動くため localhost:8080 で到達する。
        NEXT_PUBLIC_API_ROOT: "http://localhost:8080/api"
    container_name: pubsub-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
